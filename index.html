<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paaspop Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-gradient-anim" aria-hidden="true"></div>
    <div class="bg-aurora" aria-hidden="true"></div>
    <div class="bg-orbs" aria-hidden="true">
      <span class="bg-orb bg-orb--a"></span>
      <span class="bg-orb bg-orb--b"></span>
      <span class="bg-orb bg-orb--c"></span>
    </div>
    <div class="bg-curves" aria-hidden="true">
      <svg class="bg-curves__svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
        <path
          class="curve curve--one"
          d="M-120 650 C 220 520, 420 790, 760 640 C 1030 525, 1270 760, 1740 600"
        />
        <path
          class="curve curve--two"
          d="M-140 360 C 190 530, 460 160, 760 360 C 1060 555, 1300 230, 1730 430"
        />
        <path
          class="curve curve--three"
          d="M-100 780 C 240 700, 470 930, 820 820 C 1140 725, 1360 870, 1760 760"
        />
      </svg>
    </div>
    <div class="hero-overlay" aria-hidden="true">
      <div class="hero-overlay__image"></div>
    </div>
    <div class="days-badge" id="days-badge" aria-live="polite">
      <span class="days-badge__value" id="days-badge-value">—</span>
      <span class="days-badge__caption" id="days-badge-caption">dagen te gaan</span>
    </div>
    <main class="container">
      <header class="hero-head">
        <p class="hero-eyebrow">3 · 4 · 5 april 2026 · Schijndel</p>
        <h1 class="hero-title">
          <span class="hero-title-main">Paaspop</span>
          <span class="hero-title-sub">Schijndel</span>
        </h1>
      </header>
      <p class="subtitle">Countdown tot de start · vrijdag 3 april 2026, 15:00</p>

      <section class="countdown" aria-live="polite" aria-label="Countdown timer">
        <div class="time-block">
          <span id="days" class="time-value">00</span>
          <span class="time-label">Dagen</span>
        </div>
        <div class="time-block">
          <span id="hours" class="time-value">00</span>
          <span class="time-label">Uren</span>
        </div>
        <div class="time-block">
          <span id="minutes" class="time-value">00</span>
          <span class="time-label">Minuten</span>
        </div>
        <div class="time-block">
          <span id="seconds" class="time-value">00</span>
          <span class="time-label">Seconden</span>
        </div>
      </section>

      <p id="status" class="status">Check-out the line-up:</p>
      <a class="cta-button" href="https://www.paaspop.nl/nl/line-up" target="_blank" rel="noreferrer"
        >Naar Paaspop Website</a
      >

      <section class="weather-section" aria-live="polite" aria-label="Weersverwachting Paaspop">
        <h2 class="weather-title">Weersverwachting Paaspop</h2>
        <p id="weather-status" class="weather-status">Weer laden...</p>
        <div id="weather-cards" class="weather-cards"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
